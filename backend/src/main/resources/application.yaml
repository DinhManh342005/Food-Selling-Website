spring:
  application:
    name: FoodSelling

  # 1. Cấu hình database
  datasource:
    url: jdbc:mysql://localhost:3306/foodshop_db2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Manh3425
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update # Dùng 'update' khi dev, chuyển thành 'validate' khi lên production
    show-sql: true # Hiện câu lệnh SQL dưới console để dễ debug
    properties:
      hibernate:
        format-sql: true

  # 4. Cấu hình upload file ảnh (Ảnh sản phẩm, Banner)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  output:
    ansi:
      enabled: ALWAYS

# Cấu hình để swagger quét tất cả các api trong controller
springdoc:
  packages_to_scan: vn.manh.FoodSelling.controller
  swagger-ui:
    path: /swagger-ui.html  # Đường dẫn đến trang chứa api docs - swaggerUI

  # Cấu hình JWT (JSON Web Token) cho bảo mật API
jwt:
  secret: "9a4f2c8d3e1b7a6c5d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b7c"
  expiration: 86400000 #1 ngày (tính bằng milliseconds)

